name: .NET Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0'
    
    - name: Build with auto-discovery
      run: |
        echo "Looking for .NET projects..."
        find . -name "*.csproj" -type f
        
        for proj in $(find . -name "*.csproj" -type f); do
          echo "Building: $proj"
          dotnet restore "$proj"
          dotnet build "$proj" --configuration Release
          break  # Собираем только первый проект
        done